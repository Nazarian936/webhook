name: Send Rules to Discord

on:
  push:
    paths:
      - 'rules.txt.txt'

jobs:
  send-rules:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Send text in chunks
        run: |
          NODE_SCRIPT=$(cat << 'EOF'
          const fs = require("fs");
          const crypto = require("https");

          try {
            const text = fs.readFileSync("rules.txt.txt", "utf8");
            const lines = text.split("\n");
            let chunk = "";
            const webhookUrl = "https://discord.com/api/webhooks/1486303299719139348/5MvXc8QjjAyi-4PWow5m1F2ZlUtp9uW7UyOUUS2p9NRk662GSYRpcIIkjlH6oN9tjXyR";

            const send = (msg) => {
              return new Promise((resolve) => {
                const req = crypto.request(webhookUrl, {
                  method: "POST",
                  headers: { "Content-Type": application/json" }
                }, () => resolve());
                req.write(JSON.stringify({ content: msg }));
                req.end();
              });
            };

            async function run() {
              for (const line of lines) {
                if ((chunk + line).length > 1900) {
                  await send(chunk);
                  chunk = "";
                }
                chunk += line + "\n";
              }
              if (chunk.trim().length > 0) {
                await send(chunk);
              }
            }
            run();
          } catch (e) {
            console.error(e);
            process.exit(1);
          }
          EOF
          )
          node -e "$NODE_SCRIPT"
